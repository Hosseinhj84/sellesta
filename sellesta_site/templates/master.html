{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://unpkg.com/lenis@1.3.11/dist/lenis.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>{% block title %} {% endblock %}</title>
</head>

<!-- Swiper JS (قرار بگیره درست قبل از init) -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<!-- init (حتما بعد از بارگذاری اسکریپت Swiper) -->
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const swiper = new Swiper(".mySwiper", {
            loop: true,
            spaceBetween: 20,
            navigation: {
                nextEl: ".swiper-button-next",
                prevEl: ".swiper-button-prev",
            },
            breakpoints: {
                0: { slidesPerView: 1 },
                576: { slidesPerView: 2 },
                768: { slidesPerView: 3 },
                992: { slidesPerView: 4 },
                1200: { slidesPerView: 5 },
            },
        });
    });
</script>

<body>
    <nav class="navbar sticky-top bg-white">
        <div class="container-fluid d-flex align-items-center justify-content-between">

            <!-- لوگو + دکمه تماس -->
            <div class="d-flex align-items-center">
                <a class="navbar-brand" href="#">
                    <img src="{% static 'images/site-logo.png' %}" alt="sellesta-logo" class="img-fluid"
                        style="max-height: 60px;">
                </a>
                <a class="btn btn-primary text-white ms-2" data-bs-toggle="tooltip" data-bs-placement="bottom"
                    title="09111111111" href="tel:09111111111">
                    با ما تماس بگیرید
                </a>
            </div>

            <!-- منو دسکتاپ -->
            <div class="d-none d-lg-flex flex-grow-1 align-items-center justify-content-between">
                <ul class="navbar-nav mx-auto flex-row gap-3 flex-wrap">
                    {% for page in pages %}
                    <li class="nav-item">
                        <a class="nav-link" href="{{ page.redirect_url|default:page.get_absolute_url }}">
                            {{ page.title }}
                        </a>
                    </li>
                    {% endfor %}
                </ul>
                <form class="d-flex me-5 search">
                    <input class="form-control me-2" type="text" placeholder="Search">
                    <button class="btn btn-primary" type="button">Search</button>
                </form>
                <div class="d-flex align-items-center gap-2">
                    <button type="button" class="shop_box btn btn-dark position-relative">
                        <i class="bi bi-cart4"></i>
                        <span
                            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                    </button>
                    <button type="button" class="btn btn-primary d-flex align-items-center">
                        <span class="me-2">ورود</span>
                        <i class="bi bi-person"></i>
                    </button>
                </div>
            </div>

            <!-- دکمه همبرگری (فقط موبایل) -->
            <button class="navbar-toggler d-lg-none border-0" type="button" data-bs-toggle="offcanvas"
                data-bs-target="#mobileMenu" aria-controls="mobileMenu">
                <i class="bi bi-list fs-1"></i>
            </button>
        </div>
    </nav>

    <!-- منوی موبایل (Offcanvas) -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="mobileMenu">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title">منو</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <form class="d-flex mb-3">
                <input class="form-control me-2" type="text" placeholder="Search">
                <button class="btn btn-primary" type="button">Search</button>
            </form>
            <ul class="navbar-nav mb-3">
                {% for page in pages %}
                <li class="nav-item">
                    <a class="nav-link"
                        href="{% if page.url %}{{ page.url }}{% else %}{% url 'page_detail' page.slug %}{% endif %}">
                        {{ page.title }}
                    </a>
                </li>
                {% endfor %}
            </ul>
            <hr>
            <div class="d-flex align-items-center gap-2">
                <button type="button" class="shop_box btn btn-dark position-relative">
                    <i class="bi bi-cart4"></i>
                    <span
                        class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                </button>
                <button type="button" class="btn btn-primary d-flex align-items-center">
                    <span class="me-2">ورود</span>
                    <i class="bi bi-person"></i>
                </button>
            </div>
        </div>
    </div>

    {% block content %}
    {% endblock %}
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/lenis@1.3.11/dist/lenis.min.js"></script>
<script src="{% static 'js/main.js' %}"></script>

</html>
